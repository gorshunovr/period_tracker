name: "FAP: Build for multiple SDK sources"
# Build the app for Flipper release and dev SDK channels.
# Inlined (instead of flipperzero-ufbt-action) so we can pin Node 24-based actions
# and avoid Node.js 20 deprecation warnings on GitHub runners.

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    # daily build against latest SDK channels
    - cron: "1 1 * * *"

jobs:
  ufbt-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: dev channel
            sdk-channel: dev
          - name: release channel
            sdk-channel: release
    name: 'ufbt: Build for ${{ matrix.name }}'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ufbt
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade ufbt

      - name: Update SDK (${{ matrix.sdk-channel }})
        run: ufbt update --channel ${{ matrix.sdk-channel }}

      - name: Build app
        id: build-app
        run: |
          set -euo pipefail
          ufbt
          API_VERSION="$(ufbt -s get_apiversion || echo 0.0)"
          STATUS_JSON="$(ufbt status --json)"
          TARGET="$(python3 -c 'import json,sys; print(json.load(sys.stdin).get("target",""))' <<<"$STATUS_JSON")"
          VERSION="$(python3 -c 'import json,sys; print(json.load(sys.stdin).get("version",""))' <<<"$STATUS_JSON")"
          {
            echo "api_version=$API_VERSION"
            echo "suffix=${TARGET}-api-${API_VERSION}-${VERSION}"
          } >> "$GITHUB_OUTPUT"
          ls -la dist/

      - name: Upload app artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-${{ steps.build-app.outputs.suffix }}
          path: dist/*.fap
